kind = "web"
previewPath = "/"
title = "Prompt Labs"
version = "1.0.0"
id = "artifacts/prompt-labs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19812

[services.development]
run = "pnpm --filter @workspace/prompt-labs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prompt-labs", "run", "build" ]
publicDir = "artifacts/prompt-labs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19812"
BASE_PATH = "/"
